<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Refor Utkal — Team Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#123b2c;
    --green-dark:#0a2620;
    --green-light:#1c5541;
    --gold:#c8963d;
    --gold-light:#e3bd76;
    --cream:#f7f4ec;
    --cream2:#efe7d5;
    --ink:#1d2a24;
    --muted:#77837a;
    --white:#ffffff;
    --danger:#b3432b;
    --success:#3f7a52;
    --radius:14px;
    --shadow:0 6px 24px rgba(18,59,44,0.10);
    --border:#e3ddca;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;}
  #app{min-height:100vh;}
  h1,h2,h3,.brand-font{font-family:'Playfair Display',serif;}
  a{text-decoration:none;color:inherit;}
  button{font-family:'Inter',sans-serif;cursor:pointer;border:none;}
  input,select,textarea{font-family:'Inter',sans-serif;}

  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 15% 20%, rgba(200,150,61,0.12), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(18,59,44,0.10), transparent 45%), var(--cream);
    padding:24px;}
  .login-card{background:var(--white);border-radius:20px;box-shadow:var(--shadow);padding:44px 40px 36px;
    width:100%;max-width:380px;border:1px solid var(--border);text-align:center;}
  .login-logo{width:96px;height:auto;margin-bottom:6px;}
  .login-brand{font-size:26px;font-weight:700;color:var(--green);letter-spacing:0.5px;margin:6px 0 0;}
  .login-brand span{color:var(--gold);}
  .login-tag{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:2px 0 28px;}
  .field{text-align:left;margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--green);margin-bottom:6px;letter-spacing:0.3px;}
  .field input, .field select, .field textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);
    border-radius:9px;font-size:14px;background:var(--cream);color:var(--ink);transition:border-color .15s;}
  .field input:focus, .field select:focus, .field textarea:focus{outline:none;border-color:var(--gold);background:var(--white);}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 20px;border-radius:9px;
    font-size:14px;font-weight:600;transition:transform .1s, box-shadow .15s;letter-spacing:.2px;}
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--green);color:var(--white);width:100%;padding:13px;font-size:15px;margin-top:6px;}
  .btn-primary:hover{background:var(--green-light);}
  .btn-primary:disabled{opacity:0.6;cursor:not-allowed;}
  .error-msg{background:#fbe9e5;color:var(--danger);border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:14px;text-align:left;}
</style>
</head>
<body>

<div id="app">
  <div class="login-wrap">
    <div class="login-card">
      <h1 class="login-brand">REFOR <span>UTKAL</span></h1>
      <div class="login-tag">Team Portal</div>
      
      <form id="login-form">
        <div class="field">
          <label>USERNAME</label>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
        
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        
        <div id="login-error" class="error-msg" style="display: none;"></div>
        
        <button type="submit" id="login-btn" class="btn btn-primary">Sign In</button>
      </form>
      </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // 1. Supabase Initialization
  const SUPABASE_URL = "https://wlokjkprqfgpephdskmr.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indsb2tqa3BycWZncGVwaGRza21yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDM0MzksImV4cCI6MjA5ODgxOTQzOX0.1i_1bh8qGsW3zngkmS6OMxzubxjEsP_BtkG36ncobEA";
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 2. Wait for page to load completely
  document.addEventListener('DOMContentLoaded', () => {
    const loginForm = document.getElementById('login-form');
    const errorBox = document.getElementById('login-error');
    const loginBtn = document.getElementById('login-btn');

    // 3. What happens when user clicks "Sign In"
    if (loginForm) {
      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault(); // Stop page from refreshing

        const usernameInput = document.getElementById('username').value;
        const passwordInput = document.getElementById('password').value;

        // Show loading state
        loginBtn.disabled = true;
        loginBtn.innerText = "Verifying...";
        errorBox.style.display = 'none';

        try {
          // Check credentials in Supabase
          const { data, error } = await supabase.rpc('authenticate_user', {
            p_username: usernameInput,
            p_password: passwordInput
          });

          if (error) throw error;

          // If no data returned, credentials are wrong
          if (!data || data.length === 0) {
            errorBox.innerText = "Invalid username or password!";
            errorBox.style.display = 'block';
            loginBtn.disabled = false;
            loginBtn.innerText = "Sign In";
            return;
          }

          // Login Successful
          const userDetails = data[0];
          loginBtn.innerText = "Success!";
          loginBtn.style.background = "var(--success)";
          
          alert(`Welcome back, ${userDetails.display_name}! Login is working perfectly.`);
          
          // Future code: Send user to dashboard here
          // window.location.href = "dashboard.html";

        } catch (err) {
          console.error("Login Error:", err.message);
          errorBox.innerText = "Network error. Please try again.";
          errorBox.style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.innerText = "Sign In";
        }
      });
    }
  });
</script>

</body>
</html>
