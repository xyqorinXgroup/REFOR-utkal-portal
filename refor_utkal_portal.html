<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Refor Utkal — Team Portal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#123b2c;
    --green-dark:#0a2620;
    --green-light:#1c5541;
    --gold:#c8963d;
    --gold-light:#e3bd76;
    --cream:#f7f4ec;
    --cream2:#efe7d5;
    --ink:#1d2a24;
    --muted:#77837a;
    --white:#ffffff;
    --danger:#b3432b;
    --success:#3f7a52;
    --radius:14px;
    --shadow:0 6px 24px rgba(18,59,44,0.10);
    --border:#e3ddca;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif;
    background:var(--cream);
    color:var(--ink);
    min-height:100vh;
  }
  #app{min-height:100vh;}
  h1,h2,h3,.brand-font{font-family:'Playfair Display',serif;}
  a{text-decoration:none;color:inherit;}
  button{font-family:'Inter',sans-serif;cursor:pointer;border:none;}
  input,select,textarea{font-family:'Inter',sans-serif;}

  /* ---------- LOGIN ---------- */
  .login-wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 15% 20%, rgba(200,150,61,0.12), transparent 40%),
      radial-gradient(circle at 85% 80%, rgba(18,59,44,0.10), transparent 45%),
      var(--cream);
    padding:24px;
  }
  .login-card{
    background:var(--white);
    border-radius:20px;
    box-shadow:var(--shadow);
    padding:44px 40px 36px;
    width:100%;
    max-width:380px;
    border:1px solid var(--border);
    text-align:center;
  }
  .login-logo{width:96px;height:auto;margin-bottom:6px;}
  .login-brand{font-size:26px;font-weight:700;color:var(--green);letter-spacing:0.5px;margin:6px 0 0;}
  .login-brand span{color:var(--gold);}
  .login-tag{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin:2px 0 28px;}
  .field{text-align:left;margin-bottom:16px;}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--green);margin-bottom:6px;letter-spacing:0.3px;}
  .field input, .field select, .field textarea{
    width:100%;
    padding:11px 13px;
    border:1.5px solid var(--border);
    border-radius:9px;
    font-size:14px;
    background:var(--cream);
    color:var(--ink);
    transition:border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none;border-color:var(--gold);background:var(--white);
  }
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:11px 20px;border-radius:9px;font-size:14px;font-weight:600;
    transition:transform .1s, box-shadow .15s; letter-spacing:.2px;
  }
  .btn:active{transform:translateY(1px);}
  .btn-primary{background:var(--green);color:var(--white);width:100%;padding:13px;font-size:15px;margin-top:6px;}
  .btn-primary:hover{background:var(--green-light);}
  .btn-gold{background:var(--gold);color:var(--white);}
  .btn-gold:hover{background:var(--gold-light);}
  .btn-outline{background:transparent;border:1.5px solid var(--green);color:var(--green);}
  .btn-outline:hover{background:var(--green);color:var(--white);}
  .btn-danger-outline{background:transparent;border:1.5px solid var(--danger);color:var(--danger);}
  .btn-danger-outline:hover{background:var(--danger);color:var(--white);}
  .btn-sm{padding:7px 12px;font-size:12.5px;border-radius:7px;}
  .error-msg{background:#fbe9e5;color:var(--danger);border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:14px;text-align:left;}
  .hint{font-size:11.5px;color:var(--muted);margin-top:18px;line-height:1.5;}

  /* ---------- APP SHELL ---------- */
  .topbar{
    background:var(--green);
    color:var(--white);
    display:flex;align-items:center;justify-content:space-between;
    padding:0 28px;height:68px;
    box-shadow:0 2px 12px rgba(0,0,0,0.12);
    position:sticky;top:0;z-index:50;
  }
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .topbar-logo{width:38px;height:38px;border-radius:8px;object-fit:cover;}
  .topbar-brand{font-size:18px;font-weight:600;letter-spacing:.3px;}
  .topbar-brand span{color:var(--gold-light);}
  .tabs{display:flex;gap:4px;margin-left:36px;}
  .tab{
    padding:10px 16px;border-radius:8px;font-size:13.5px;font-weight:600;color:rgba(255,255,255,0.72);
    background:transparent;
  }
  .tab:hover{color:var(--white);background:rgba(255,255,255,0.06);}
  .tab.active{color:var(--green-dark);background:var(--gold-light);}
  .topbar-right{display:flex;align-items:center;gap:14px;}
  .user-chip{display:flex;flex-direction:column;align-items:flex-end;line-height:1.25;}
  .user-chip .name{font-size:13.5px;font-weight:600;}
  .user-chip .role{font-size:10.5px;color:var(--gold-light);text-transform:uppercase;letter-spacing:.6px;}
  .logout-btn{background:rgba(255,255,255,0.1);color:var(--white);padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:600;}
  .logout-btn:hover{background:rgba(255,255,255,0.18);}
  .mobile-tabs{display:none;}

  .content{max-width:1180px;margin:0 auto;padding:28px 24px 60px;}
  .page-title{font-size:24px;font-weight:600;color:var(--green);margin:0 0 4px;}
  .page-sub{color:var(--muted);font-size:13.5px;margin:0 0 26px;}

  /* ---------- CARDS / GRID ---------- */
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:30px;}
  .stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
  .stat-card .label{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;}
  .stat-card .value{font-size:24px;font-weight:700;color:var(--green);margin-top:6px;font-family:'Playfair Display',serif;}
  .stat-card .value.gold{color:var(--gold);}

  .panel{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 24px;margin-bottom:22px;}
  .panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
  .panel-head h3{margin:0;font-size:17px;color:var(--green);font-weight:600;}

  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);padding:8px 10px;border-bottom:2px solid var(--border);}
  td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .table-wrap{overflow-x:auto;}

  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.2px;}
  .badge-green{background:#e4efe8;color:var(--success);}
  .badge-gold{background:#faf0dd;color:#96701f;}
  .badge-red{background:#fbe9e5;color:var(--danger);}
  .badge-grey{background:#eee;color:var(--muted);}

  .client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px;}
  .client-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s,box-shadow .12s;}
  .client-card:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(18,59,44,0.14);}
  .client-card h4{margin:0 0 6px;font-size:16px;color:var(--green);font-family:'Playfair Display',serif;}
  .client-card .meta{font-size:12.5px;color:var(--muted);margin-bottom:10px;}
  .client-card .row{display:flex;justify-content:space-between;font-size:12.5px;margin-top:4px;}
  .client-card .row b{color:var(--ink);}

  .back-link{display:inline-flex;align-items:center;gap:6px;color:var(--green);font-weight:600;font-size:13px;margin-bottom:16px;}
  .back-link:hover{text-decoration:underline;}

  .detail-grid{display:grid;grid-template-columns:1.1fr 1.4fr;gap:20px;}
  @media (max-width:900px){.detail-grid{grid-template-columns:1fr;}}

  .info-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px;}
  .info-row:last-child{border-bottom:none;}
  .info-row .k{color:var(--muted);}
  .info-row .v{font-weight:600;text-align:right;max-width:60%;word-break:break-word;}
  .mask-toggle{display:inline-flex;align-items:center;gap:6px;}
  .eye-btn{background:none;border:none;color:var(--gold);font-size:11px;font-weight:700;padding:0;}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:600px){.form-grid{grid-template-columns:1fr;}}
  .form-grid .full{grid-column:1/-1;}

  .modal-overlay{position:fixed;inset:0;background:rgba(10,20,16,0.55);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;z-index:100;}
  .modal{background:var(--white);border-radius:16px;padding:26px 26px 22px;max-width:560px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .modal h3{margin:0 0 18px;color:var(--green);font-size:18px;}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;}

  .empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty-state .big{font-size:38px;margin-bottom:8px;}

  .points-editor-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
  .points-editor-row:last-child{border-bottom:none;}
  .points-editor-row span{font-size:13.5px;}
  .points-editor-row input{width:70px;padding:6px 8px;border:1.5px solid var(--border);border-radius:7px;text-align:center;}

  .subtabs{display:flex;gap:6px;margin-bottom:20px;border-bottom:2px solid var(--border);}
  .subtab{padding:10px 4px;margin-right:18px;font-size:13.5px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;}
  .subtab.active{color:var(--green);border-bottom:2px solid var(--gold);}

  .calc-result{background:var(--cream2);border-radius:10px;padding:16px 18px;margin-top:14px;}
  .calc-result .line{display:flex;justify-content:space-between;font-size:13.5px;padding:4px 0;}
  .calc-result .line.total{font-weight:700;color:var(--green);border-top:1px solid var(--border);margin-top:6px;padding-top:8px;}

  .toast{position:fixed;bottom:24px;right:24px;background:var(--green);color:var(--white);padding:12px 18px;border-radius:10px;font-size:13.5px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,0.2);z-index:200;}

  @media (max-width:820px){
    .tabs{display:none;}
    .topbar{padding:0 16px;}
    .mobile-tabs{display:flex;overflow-x:auto;background:var(--green-dark);padding:8px 10px;gap:6px;}
    .mobile-tabs .tab{white-space:nowrap;color:rgba(255,255,255,0.75);}
    .mobile-tabs .tab.active{color:var(--green-dark);background:var(--gold-light);}
    .content{padding:20px 14px 60px;}
  }
</style>
</head>

/* ---------------- storage helpers ---------------- */
async function loadKey(key, fallback){
  try{
    const res = await window.storage.get(key, true);
    return res ? JSON.parse(res.value) : fallback;
  }catch(e){ return fallback; }
}
async function saveKey(key, value){
  try{ await window.storage.set(key, JSON.stringify(value), true); }
  catch(e){ console.error('save failed', key, e); }
}

/* ---------------- utils ---------------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function escapeHtml(str){
  if(str===undefined || str===null) return '';
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function fmtMoney(n){ n = Number(n)||0; return '₹' + n.toLocaleString('en-IN'); }
function fmtDate(d){
  if(!d) return '—';
  try{ return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }
  catch(e){ return d; }
}
function cyrb53(str, seed){
  let h1 = 0xdeadbeef ^ seed, h2 = 0x41c6ce57 ^ seed;
  for(let i=0, ch; i<str.length; i++){
    ch = str.charCodeAt(i);
    h1 = Math.imul(h1 ^ ch, 2654435761);
    h2 = Math.imul(h2 ^ ch, 1597334677);
  }
  h1 = Math.imul(h1 ^ (h1>>>16), 2246822507) ^ Math.imul(h2 ^ (h2>>>13), 3266489909);
  h2 = Math.imul(h2 ^ (h2>>>16), 2246822507) ^ Math.imul(h1 ^ (h1>>>13), 3266489909);
  return (4294967296 * (2097151 & h2) + (h1>>>0)).toString(36);
}
async function sha256(text){
  /* Deterministic client-side hash. Avoids depending on the Web Crypto API
     (crypto.subtle), which is unavailable in some sandboxed preview contexts.
     Passwords are never stored in plain text. */
  return cyrb53(text, 0x9e3779b9) + '-' + cyrb53('ru-salt-'+text, 0x85ebca6b);
}
function showToast(msg){
  toastMsg = msg;
  render();
  setTimeout(()=>{ toastMsg=''; render(); }, 2200);
}

    if(!pointConfig){ pointConfig = defaultPointConfig(); await saveKey('ru_pointConfig', pointConfig); }

  }
}

/* ---------------- auth ---------------- */
async function handleLogin(ev){
  ev.preventDefault();
  try{
    const fd = new FormData(ev.target);
    const uname = (fd.get('username')||'').trim().toLowerCase();
    const pass = fd.get('password')||'';
    const user = users.find(u => u.username.toLowerCase() === uname);
    if(!user || !user.active){ loginError = 'Invalid username or password.'; render(); return false; }
    const hash = await sha256(pass);
    if(hash !== user.passwordHash){ loginError = 'Invalid username or password.'; render(); return false; }
    loginError = '';
    currentUser = user;
    currentView = 'dashboard';
    render();
  }catch(err){
    console.error('Login failed:', err);
    loginError = 'Something went wrong while logging in: ' + err.message;
    render();
  }
  return false;
}
function handleLogout(){
  currentUser = null;
  currentView = 'dashboard';
  render();
}

/* ---------------- derived helpers ---------------- */
function clientById(id){ return clients.find(c=>c.id===id); }
function totalPaidForClient(c){ return (c.payments||[]).reduce((s,p)=>s+Number(p.amount||0),0); }
function tasksForClient(id){ return tasks.filter(t=>t.clientId===id); }
function tasksForUser(uname){ return tasks.filter(t=>t.username===uname); }
function displayNameFor(uname){ const u=users.find(x=>x.username===uname); return u?u.displayName:uname; }
function totalEarnedByUser(uname){
  let sum = 0;
  distributions.forEach(d=>{
    const row = d.breakdown.find(b=>b.username===uname);
    if(row) sum += row.payout;
  });
  return sum;
}

let lastCalc = null;
function calculateDistribution(){
  const clientId = document.getElementById('calc-client').value;
  const amount = Number(document.getElementById('calc-amount').value || 0);
  const relevant = tasks.filter(t => !t.paid && (clientId==='' || t.clientId===clientId));
  const totalPoints = relevant.reduce((s,t)=>s+Number(t.points||0),0);
  const agencyFund = Math.round(amount * pointConfig.agencyFundPercent / 100);
  const remaining = amount - agencyFund;
  const perPoint = totalPoints > 0 ? remaining / totalPoints : 0;

  const byUser = {};
  relevant.forEach(t=>{
    byUser[t.username] = (byUser[t.username]||0) + Number(t.points||0);
  });
  const breakdown = Object.keys(byUser).map(uname=>({
    username: uname,
    points: byUser[uname],
    payout: Math.round(byUser[uname]*perPoint)
  }));

  lastCalc = {clientId, amount, agencyFund, remaining, totalPoints, perPoint, breakdown, relevantIds: relevant.map(t=>t.id)};

  const out = document.getElementById('calc-output');
  if(totalPoints===0 || amount<=0){
    out.innerHTML = `<div class="calc-result"><div class="line">No unsettled tasks / amount found for this scope.</div></div>`;
    return;
  }
  out.innerHTML = `
    <div class="calc-result">
      <div class="line"><span>Agency Fund (${pointConfig.agencyFundPercent}%)</span><span>${fmtMoney(agencyFund)}</span></div>
      <div class="line"><span>Remaining To Distribute</span><span>${fmtMoney(remaining)}</span></div>
      <div class="line"><span>Total Unsettled Points In Scope</span><span>${totalPoints}</span></div>
      <div class="line"><span>Value Per Point</span><span>${fmtMoney(perPoint.toFixed(2))}</span></div>
      <div class="line total"><span>Members Involved</span><span>${breakdown.length}</span></div>
      ${breakdown.map(b=>`<div class="line"><span>${escapeHtml(displayNameFor(b.username))} — ${b.points} pts</span><span><b>${fmtMoney(b.payout)}</b></span></div>`).join('')}
    </div>
    <button class="btn btn-gold" style="margin-top:14px;" onclick="confirmDistribution()">Confirm &amp; Save Distribution</button>
  `;
}

async function confirmDistribution(){
  if(!lastCalc || lastCalc.breakdown.length===0) return;
  const record = {
    id: uid(),
    date: new Date().toISOString(),
    clientId: lastCalc.clientId || null,
    amount: lastCalc.amount,
    agencyFund: lastCalc.agencyFund,
    totalPoints: lastCalc.totalPoints,
    perPoint: lastCalc.perPoint,
    breakdown: lastCalc.breakdown
  };
  distributions.push(record);
  tasks.forEach(t=>{ if(lastCalc.relevantIds.includes(t.id)) t.paid = true; });
  await saveKey('ru_distributions', distributions);
  await saveKey('ru_tasks', tasks);
  lastCalc = null;
  showToast('Distribution saved and tasks marked settled.');
}

  showToast('Client deleted.');
}

  const c = clientById(paymentModalClientId);
  c.payments = c.payments || [];
  c.payments.push({id: uid(), amount: Number(fd.get('amount')||0), date: fd.get('date'), note: fd.get('note').trim()});
  await saveKey('ru_clients', clients);
  paymentModalOpen = false; paymentModalClientId = null;
  showToast('Payment recorded.');
  return false;
}

/* ----- task modal ----- */
let taskModalOpen = false, taskModalClientId = null;
function openTaskModal(clientId){ taskModalOpen = true; taskModalClientId = clientId; render(); }
function closeTaskModal(){ taskModalOpen = false; taskModalClientId = null; render(); }
function renderTaskModalContainer(){
  if(!taskModalOpen) return '';
  const memberOptions = users.filter(u=>u.active).map(u=>`<option value="${u.username}">${escapeHtml(u.displayName)}</option>`).join('');
  const taskOptions = Object.keys(pointConfig.tasks).map(t=>`<option value="${escapeHtml(t)}" data-points="${pointConfig.tasks[t]}">${escapeHtml(t)} (${pointConfig.tasks[t]} pts)</option>`).join('');
  return `
  <div class="modal-overlay" onclick="if(event.target===this) closeTaskModal()">
    <div class="modal">
      <h3>Log Team Contribution</h3>
      <form onsubmit="return saveTaskForm(event)">
        <div class="form-grid">
          <div class="field"><label>Member</label><select name="username" required>${memberOptions}</select></div>
          <div class="field"><label>Task Type</label><select name="taskType" required>${taskOptions}</select></div>
          <div class="field"><label>Date</label><input name="date" type="date" required value="${new Date().toISOString().slice(0,10)}"/></div>
          <div class="field full"><label>Note (optional)</label><input name="note" placeholder="Any extra detail..."/></div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="closeTaskModal()">Cancel</button>
          <button type="submit" class="btn btn-gold">Add Task</button>
        </div>
      </form>
    </div>
  </div>`;
}
async function saveTaskForm(ev){
  ev.preventDefault();
  const fd = new FormData(ev.target);
  const taskType = fd.get('taskType');
  const points = pointConfig.tasks[taskType] || 0;
  tasks.push({
    id: uid(),
    clientId: taskModalClientId,
    username: fd.get('username'),
    taskType, points,
    date: fd.get('date'),
    note: fd.get('note').trim(),
    paid: false
  });
  await saveKey('ru_tasks', tasks);
  taskModalOpen = false; taskModalClientId = null;
  showToast('Contribution logged.');
  return false;
}

/* ---------------- MY CONTRIBUTIONS ---------------- */
function renderMyContributions(){
  const isAdmin = currentUser.role==='admin';
  const targetOptions = isAdmin ? users.filter(u=>u.role==='member') : [currentUser];
  const [viewingUser, setViewer] = [window.__mcViewer || (isAdmin ? targetOptions[0]?.username : currentUser.username), null];
  const uname = window.__mcViewer || currentUser.username;
  const myTasks = tasksForUser(uname);
  const myPoints = myTasks.reduce((s,t)=>s+Number(t.points||0),0);
  const unpaidPoints = myTasks.filter(t=>!t.paid).reduce((s,t)=>s+Number(t.points||0),0);
  const earnings = totalEarnedByUser(uname);

  return `
  <h1 class="page-title">My Contributions</h1>
  <p class="page-sub">Point-based contribution log and earnings.</p>
  ${isAdmin ? `
  <div class="field" style="max-width:260px;margin-bottom:20px;">
    <label>Viewing</label>
    <select onchange="window.__mcViewer=this.value; render();">
      ${users.filter(u=>u.role!=='admin' || u.username===currentUser.username).map(u=>`<option value="${u.username}" ${uname===u.username?'selected':''}>${escapeHtml(u.displayName)}</option>`).join('')}
    </select>
  </div>` : ''}
  <div class="stat-grid">
    <div class="stat-card"><div class="label">Total Points</div><div class="value">${myPoints}</div></div>
    <div class="stat-card"><div class="label">Points Awaiting Settlement</div><div class="value gold">${unpaidPoints}</div></div>
    <div class="stat-card"><div class="label">Total Earnings</div><div class="value">${fmtMoney(earnings)}</div></div>
  </div>
  <div class="panel">
    <div class="panel-head"><h3>Contribution Log</h3></div>
    ${renderTaskTable(myTasks.slice().reverse(), false)}
  </div>
  `;
}

/* ---------------- ADMIN ---------------- */
function renderAdmin(){
  const sub = [
    {key:'members', label:'Members'},
    {key:'points', label:'Point System'},
    {key:'history', label:'Distribution History'}
  ];
  return `
  <h1 class="page-title">Admin</h1>
  <p class="page-sub">Manage team access, the point system, and settlement records.</p>
  <div class="subtabs">
    ${sub.map(s=>`<div class="subtab ${adminSubView===s.key?'active':''}" onclick="adminSubView='${s.key}';render();">${s.label}</div>`).join('')}
  </div>
  ${adminSubView==='members' ? renderAdminMembers() : ''}
  ${adminSubView==='points' ? renderAdminPoints() : ''}
  ${adminSubView==='history' ? renderDistributionHistory() : ''}
  `;
}

function renderAdminMembers(){
  const rows = users.map(u=>`
    <tr>
      <td>${escapeHtml(u.displayName)}</td>
      <td>${escapeHtml(u.username)}</td>
      <td><span class="badge ${u.role==='admin'?'badge-gold':'badge-grey'}">${u.role}</span></td>
      <td><span class="badge ${u.active?'badge-green':'badge-red'}">${u.active?'Active':'Removed'}</span></td>
      <td style="white-space:nowrap;">
        <button class="btn btn-outline btn-sm" onclick="openMemberModal('${u.username}')">Edit</button>
        ${u.role!=='admin' ? `<button class="btn ${u.active?'btn-danger-outline':'btn-outline'} btn-sm" style="margin-left:6px;" onclick="toggleMemberActive('${u.username}')">${u.active?'Remove':'Restore'}</button>` : ''}
      </td>
    </tr>`).join('');
  return `
  <div class="panel">
    <div class="panel-head"><h3>Team Members</h3><button class="btn btn-gold btn-sm" onclick="openMemberModal()">+ Add Member</button></div>
    <div class="table-wrap"><table>
      <thead><tr><th>Name</th><th>Username</th><th>Role</th><th>Status</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
  </div>
  ${renderMemberModalContainer()}
  `;
}

let memberModalOpen=false, memberModalUsername=null;
function openMemberModal(username){ memberModalOpen=true; memberModalUsername=username||null; render(); }
function closeMemberModal(){ memberModalOpen=false; memberModalUsername=null; render(); }
function renderMemberModalContainer(){
  if(!memberModalOpen) return '';
  const u = memberModalUsername ? users.find(x=>x.username===memberModalUsername) : null;
  return `
  <div class="modal-overlay" onclick="if(event.target===this) closeMemberModal()">
    <div class="modal">
      <h3>${u?'Edit Member':'Add New Member'}</h3>
      <form onsubmit="return saveMemberForm(event)">
        <div class="form-grid">
          <div class="field full"><label>Display Name</label><input name="displayName" required value="${u?escapeHtml(u.displayName):''}"/></div>
          <div class="field full"><label>Username</label><input name="username" required ${u?'':''} value="${u?escapeHtml(u.username):''}" ${u&&u.role==='admin'?'readonly':''}/></div>
          <div class="field full"><label>${u?'New Password (leave blank to keep unchanged)':'Password'}</label><input name="password" type="password" ${u?'':'required'}/></div>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" onclick="closeMemberModal()">Cancel</button>
          <button type="submit" class="btn btn-gold">${u?'Save Changes':'Add Member'}</button>
        </div>
      </form>
    </div>
  </div>`;
}
async function saveMemberForm(ev){
  ev.preventDefault();
  const fd = new FormData(ev.target);
  const displayName = fd.get('displayName').trim();
  const username = fd.get('username').trim().toLowerCase();
  const password = fd.get('password');

  if(memberModalUsername){
    const u = users.find(x=>x.username===memberModalUsername);
    u.displayName = displayName;
    if(u.role!=='admin') u.username = username;
    if(password) u.passwordHash = await sha256(password);
  }else{
    if(users.find(x=>x.username===username)){ alert('Username already exists.'); return false; }
    users.push({username, passwordHash: await sha256(password), role:'member', displayName, active:true});
  }
  await saveKey('ru_users', users);
  memberModalOpen=false; memberModalUsername=null;
  showToast('Member saved.');
  return false;
}
async function toggleMemberActive(username){
  const u = users.find(x=>x.username===username);
  if(!u) return;
  if(u.active && !confirm(`Remove ${u.displayName}? They will no longer be able to log in.`)) return;
  u.active = !u.active;
  await saveKey('ru_users', users);
  showToast(u.active ? 'Member restored.' : 'Member removed.');
}

function renderAdminPoints(){
  const taskRows = Object.keys(pointConfig.tasks).map(t=>`
    <div class="points-editor-row">
      <span>${escapeHtml(t)}</span>
      <input type="number" min="0" data-task="${escapeHtml(t)}" value="${pointConfig.tasks[t]}"/>
    </div>`).join('');
  return `
  <div class="panel">
    <div class="panel-head"><h3>Point Values</h3></div>
    <div class="field" style="max-width:220px;">
      <label>Agency Fund (%)</label>
      <input id="agency-fund-pct" type="number" min="0" max="100" value="${pointConfig.agencyFundPercent}"/>
    </div>
    <div style="margin-top:10px;">${taskRows}</div>
    <button class="btn btn-gold" style="margin-top:18px;" onclick="savePointConfig()">Save Changes</button>
  </div>`;
}
async function savePointConfig(){
  const pct = Number(document.getElementById('agency-fund-pct').value||0);
  const inputs = document.querySelectorAll('.points-editor-row input[data-task]');
  const newTasks = {};
  inputs.forEach(inp=>{ newTasks[inp.dataset.task] = Number(inp.value||0); });
  pointConfig = {agencyFundPercent: pct, tasks: newTasks};
  await saveKey('ru_pointConfig', pointConfig);
  showToast('Point system updated.');
}

/* ---------------- boot ---------------- */
init();
</script>
</body>
</html>
